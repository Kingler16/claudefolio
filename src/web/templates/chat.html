{% extends "base.html" %}

{% block title %}{{ t.chat.title }} — Velora{% endblock %}

{% block head %}
<link rel="stylesheet" href="/static/css/chat.css?v={{ asset_v }}">
<link rel="stylesheet" href="/static/vendor/highlight.css?v={{ asset_v }}">
<script src="/static/vendor/marked.min.js?v={{ asset_v }}" defer></script>
<script src="/static/vendor/highlight.min.js?v={{ asset_v }}" defer></script>
<script>
  window.VELORA_I18N = {
    welcome: {{ t.chat.welcome|tojson }},
    welcome_sub: {{ t.chat.welcome_sub|tojson }},
    suggestions: [
      { label: {{ t.chat.suggestion_diversified|tojson }}, prompt: {{ t.chat.prompt_diversified|tojson }} },
      { label: {{ t.chat.suggestion_top5|tojson }},        prompt: {{ t.chat.prompt_top5|tojson }} },
      { label: {{ t.chat.suggestion_redflags|tojson }},    prompt: {{ t.chat.prompt_redflags|tojson }} },
      { label: {{ t.chat.suggestion_taxloss|tojson }},     prompt: {{ t.chat.prompt_taxloss|tojson }} },
      { label: {{ t.chat.suggestion_sectors|tojson }},     prompt: {{ t.chat.prompt_sectors|tojson }} },
      { label: {{ t.chat.suggestion_sentiment|tojson }},   prompt: {{ t.chat.prompt_sentiment|tojson }} },
    ]
  };
</script>
{% endblock %}

{% block content %}
<div class="chat-layout" data-page="chat">

    <aside class="chat-sidebar">
        <div class="chat-sidebar-header">
            <button id="chat-new" class="btn-new" title="⌘K">{{ t.chat.new_chat }}</button>
        </div>
        <input id="chat-search" class="chat-sidebar-search" type="search" placeholder="{{ t.chat.search_placeholder }}" />
        <div id="chat-thread-list" class="chat-thread-list"></div>
    </aside>

    <main class="chat-main">
        <div class="chat-header">
            <button type="button" class="chat-threads-toggle" aria-label="{{ t.chat.title }}"
                    onclick="(function(){var s=document.querySelector('.chat-sidebar');var b=document.body;var open=!s.classList.contains('mobile-open');s.classList.toggle('mobile-open',open);b.classList.toggle('chat-sidebar-open',open);})()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div id="chat-header-title" class="chat-header-title">Velora</div>
            <div class="chat-header-actions">
                <button id="chat-pin-toggle" class="chat-header-btn" title="{{ t.chat.pin }}" aria-label="{{ t.chat.pin }}">☆<span class="chat-header-btn-label"> {{ t.chat.pin }}</span></button>
                <button id="chat-delete-btn" class="chat-header-btn" title="{{ t.chat.delete }}" aria-label="{{ t.chat.delete }}">🗑<span class="chat-header-btn-label"> {{ t.chat.delete }}</span></button>
            </div>
        </div>
        <div class="chat-sidebar-backdrop" onclick="document.querySelector('.chat-sidebar').classList.remove('mobile-open'); document.body.classList.remove('chat-sidebar-open');"></div>

        <div id="chat-messages" class="chat-messages">
            <!-- Messages werden via JS gerendert -->
        </div>

        <div class="chat-input-wrap">
            <div class="chat-input-inner">
                <textarea id="chat-input" class="chat-input" rows="1"
                    placeholder="{{ t.chat.placeholder }}"></textarea>
                <button id="chat-send" class="chat-send-btn" disabled title="{{ t.chat.send }}">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <div class="chat-input-footer">
                <span>{{ t.chat.footer_hint }}</span>
                <span>Opus · high effort</span>
            </div>
        </div>
    </main>

</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/chat.js" defer></script>
<script>
// Phone: Tap auf Thread-Item schliesst die Sidebar wieder. Delegation, damit
// auch dynamisch gerenderte Threads erfasst werden.
(function(){
    var sidebar = document.querySelector('.chat-sidebar');
    if (!sidebar) return;
    sidebar.addEventListener('click', function(e){
        if (!window.matchMedia('(max-width: 767.98px)').matches) return;
        if (!e.target.closest('.chat-thread-item')) return;
        sidebar.classList.remove('mobile-open');
        document.body.classList.remove('chat-sidebar-open');
    });
})();
</script>
{% endblock %}
