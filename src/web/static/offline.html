<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#030510">
    <title>Offline — Velora</title>
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/apple-touch-icon.png">
    <style>
        :root { color-scheme: dark; }
        html, body { margin: 0; height: 100%; }
        body {
            font-family: "Inter", system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at 20% 20%, #0b1433 0%, #030510 60%);
            color: #f0f9ff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: env(safe-area-inset-top) max(16px, env(safe-area-inset-right)) env(safe-area-inset-bottom) max(16px, env(safe-area-inset-left));
            text-align: center;
        }
        main {
            max-width: 420px;
            padding: 32px 24px;
            background: rgba(255, 255, 255, 0.045);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        img { width: 72px; height: 72px; margin-bottom: 16px; }
        h1 { margin: 0 0 8px; font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
        p  { margin: 0 0 20px; color: #94a3b8; font-size: 14px; line-height: 1.55; }
        button {
            appearance: none;
            background: linear-gradient(135deg, #22d3ee 0%, #0ea5e9 50%, #6366f1 100%);
            color: #ffffff;
            border: 0;
            border-radius: 12px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 18px rgba(14, 165, 233, 0.35);
            min-height: 44px;
        }
        button:active { transform: scale(0.98); }
        small { display: block; margin-top: 18px; color: #64748b; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; }
    </style>
</head>
<body>
    <main>
        <img src="/static/icons/icon-192.png" alt="Velora" />
        <h1>Gerade offline</h1>
        <p>Velora ist aktuell nicht erreichbar. Sobald wieder Verbindung besteht, läuft alles weiter. Zwischengespeicherte Inhalte (letzter Portfolio-Stand, Briefings) sind weiter abrufbar.</p>
        <button onclick="location.reload()">Erneut versuchen</button>
        <small>Velora · PWA</small>
    </main>
</body>
</html>
